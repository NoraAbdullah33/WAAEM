# Render blueprint — WAAEM full stack (backend + frontend + PostgreSQL)
# Deploy: Render Dashboard → New → Blueprint → connect this repo.
databases:
  - name: waaem-db
    plan: free
    databaseName: waaem
    user: waaem

services:
  # --- Backend: FastAPI + async SQLAlchemy ---
  - type: web
    name: waaem-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: waaem-db
          property: connectionString
      # Render provides postgres://…; the app converts it to asyncpg at runtime.
      - key: OLLAMA_HOST
        sync: false          # set to your hosted Ollama/llama endpoint (optional)
      - key: LLAMA_MODEL
        value: llama3.1
      - key: AI_ALLOW_FALLBACK
        value: "true"
      - key: CORS_ORIGINS
        value: "*"

  # --- Frontend: Next.js (standalone) ---
  # Proxies /api/* to the backend via BACKEND_URL (server-side rewrite).
  - type: web
    name: waaem-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      # After the first deploy, set this to the backend's public URL,
      # e.g. https://waaem-backend.onrender.com  (Blueprints can't inject
      # a full https:// URL from another service, so it's set manually.)
      - key: BACKEND_URL
        sync: false
